<!doctype html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/src/style.css">
  <title>Kurshantering</title>
</head>

<body>

    <header>
      <h1>Laboration 1</h1>
    </header>

    <main>
    <section class="section1">
      <h2>Kurshantering</h2>

      <form id="courseform">

        <!--Inputfält för kurskod-->
        <input type="text" id="code" placeholder="Kurskod" required>

        <!--Inputfält för kursnamn-->
        <input type="text" id="name" placeholder="Kursnamn" required>

        <!--Val av progressionsnivå-->
        <select id="progression" required>
          <option value="">Välj nivå</option>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
        </select>

        <!--LÄnk till kursplan-->
        <input type="url" id="syllabus" placeholder="Länk till kursplan">

        <!--Knapp för att lägga till kurs-->
        <button type="submit">Lägg till kurs</button>

        </form>

    </section>

    <section class="section2">

        <!--Container för kurslista med tillagda kurser-->
        <div id="courselist"></div>

    </section>

  </main>

  <footer>
    
    <p><strong>Sida skapad av:</strong></p>
    <p>Daniela Giovnella<br>
    dagi2500@student.miun.se</p>
  </footer>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
